services:
  postgres:
    image: postgres:16-alpine
    container_name: inventory-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-inventory_db}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-inventory_secret}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-inventory_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./inventory-be-master
      dockerfile: Dockerfile
    container_name: inventory-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-inventory_db}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-inventory_secret}
      DDL_AUTO: ${DDL_AUTO:-update}
      SHOW_SQL: ${SHOW_SQL:-false}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:80,http://localhost:4200}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s

  frontend:
    build:
      context: ./inventory-fe-master
      dockerfile: Dockerfile
    container_name: inventory-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      BACKEND_URL: http://backend:8080
      PORT: 80
    ports:
      - "${FRONTEND_PORT:-80}:80"

  db-seed:
    image: postgres:16-alpine
    container_name: inventory-db-seed
    depends_on:
      backend:
        condition: service_healthy
    environment:
      PGPASSWORD: ${DB_PASSWORD:-inventory_secret}
      PGUSER: ${DB_USERNAME:-postgres}
      PGDATABASE: ${DB_NAME:-inventory_db}
    volumes:
      - ./inventory-be-master/db/seed/seed-data-postgres.sql:/seed/seed-data-postgres.sql:ro
    entrypoint:
      - sh
      - -c
      - |
        if psql -h postgres -tc "SELECT 1 FROM inventory_balance LIMIT 1" | grep -q 1; then
          echo 'Database already seeded, skipping.'
        else
          psql -h postgres -f /seed/seed-data-postgres.sql
          echo 'Seed data applied.'
        fi
    restart: "no"

volumes:
  postgres_data:
