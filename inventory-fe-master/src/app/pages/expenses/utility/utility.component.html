<div class="justify-center flex mt-4">
  <nz-card [nzTitle]="formTitle" class="w-1/2 shadow-md" [nzExtra]="quit">
  <form nz-form class="w-full" [formGroup]="validateForm" (ngSubmit)="save(validateForm.value)">

    <nz-form-item>
      <nz-form-label [nzSpan]="7"><span class="text-lg">Utility Type</span></nz-form-label>
      <nz-form-control [nzSpan]="12" nzHasFeedback>
        <nz-select name = "select" formControlName="name">
          <nz-option  [nzValue]="'Electricity'" [nzLabel]="'Electricity'"></nz-option>
          <nz-option [nzValue]="'Water'" [nzLabel]="'Water'"></nz-option>
          <nz-option [nzValue]="'Other'" [nzLabel]="'Other'"></nz-option>
        </nz-select>
      </nz-form-control>
    </nz-form-item>

    <nz-form-item>
      <nz-form-label [nzSpan]="7"><span class="text-lg">Amount In ETB</span></nz-form-label>
      <nz-form-control [nzSpan]="12" nzHasFeedback>
        <nz-input-number name="input" style="width:100%" formControlName="amount"></nz-input-number>
      </nz-form-control>
  </nz-form-item>

    <nz-form-item>
          <nz-form-control [nzOffset]="7" [nzSpan]="12">
            <button nz-button nzType="primary" class="m-4 w-32 rounded-sm">Save</button>
          </nz-form-control>
       </nz-form-item>


  </form>
  </nz-card>
  </div>

  <ng-template #formTitle>
    <p class="text-xl text-weight-10 font-bold">Utility Service payments registration</p>
  </ng-template>

  <ng-template #quit><a [routerLink]="[ '/home' ]"><nz-icon nzType="close" nzTheme="outline" /></a></ng-template>
